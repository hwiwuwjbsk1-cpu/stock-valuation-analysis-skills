name: Package Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create package directory
        run: mkdir -p dist

      - name: Package skills into zip
        run: |
          cd skills
          zip -r ../dist/stock-valuation-analysis-skills.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stock-valuation-analysis-skills
          path: dist/stock-valuation-analysis-skills.zip
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/stock-valuation-analysis-skills.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
